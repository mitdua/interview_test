services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/interview.db
    volumes:
      - db-data:/app/data
      - audio-data:/app/audio_answers
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
  audio-data:
